<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BTC Makro-Analyse — 1W + 1D</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#070b0f;--bg2:#0d1117;--bg3:#161b22;--bg4:#1c2128;
  --border:#21262d;--border2:#30363d;
  --text:#e6edf3;--muted:#7d8590;--dim:#454c56;
  --long:#26a69a;--short:#ef5350;--accent:#f0c040;--accent2:#4fc3f7;
  --fib:#ce93d8;--phase-c:#ff9800;
  --bull-s:#26a69a;--bull:#4caf50;--bull-w:#8bc34a;
  --bear-s:#ef5350;--bear:#f44336;--bear-w:#ff7043;
  --neutral:#90a4ae;
  --mono:'Space Mono',monospace;--sans:'Syne',sans-serif;
  --r:8px;
}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:var(--sans);font-size:14px;min-height:100vh;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.03) 2px,rgba(0,0,0,.03) 4px);pointer-events:none;z-index:9999}

.shell{max-width:1600px;margin:0 auto;padding:0 24px 100px}

/* ── Header ── */
header{display:flex;align-items:center;justify-content:space-between;padding:28px 0 24px;border-bottom:1px solid var(--border);margin-bottom:28px;position:sticky;top:0;background:var(--bg);z-index:100;gap:16px;flex-wrap:wrap}
.logo{display:flex;align-items:center;gap:14px}
.logo-icon{width:38px;height:38px;background:var(--fib);border-radius:6px;display:grid;place-items:center;font-size:18px;box-shadow:0 0 20px rgba(206,147,216,.25)}
.logo-text h1{font-weight:800;font-size:18px;letter-spacing:-.3px;line-height:1}
.logo-text span{font-family:var(--mono);font-size:10px;color:var(--muted);letter-spacing:2px;text-transform:uppercase}
.nav-links{display:flex;gap:8px}
.nav-link{background:var(--bg3);border:1px solid var(--border2);color:var(--muted);padding:7px 16px;border-radius:var(--r);font-family:var(--mono);font-size:11px;cursor:pointer;text-decoration:none;transition:all .2s;display:inline-flex;align-items:center;gap:6px}
.nav-link:hover{border-color:var(--accent);color:var(--accent)}
.nav-link.active{border-color:var(--fib);color:var(--fib)}
.refresh-btn{background:var(--bg3);border:1px solid var(--border2);color:var(--text);padding:7px 16px;border-radius:var(--r);font-family:var(--mono);font-size:11px;cursor:pointer;transition:all .2s}
.refresh-btn:hover{border-color:var(--fib);color:var(--fib);box-shadow:0 0 12px rgba(206,147,216,.15)}

/* ── Cache Badge ── */
.cache-info{font-family:var(--mono);font-size:10px;color:var(--muted);background:var(--bg3);border:1px solid var(--border);padding:4px 10px;border-radius:4px}

/* ── Loading / Error ── */
.loading-state{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;padding:100px;color:var(--muted);font-family:var(--mono);font-size:12px}
.spinner{width:40px;height:40px;border:2px solid var(--border2);border-top-color:var(--fib);border-radius:50%;animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.error-state{padding:40px;text-align:center;color:var(--short);font-family:var(--mono)}

/* ── Bias Hero ── */
.bias-hero{border-radius:12px;padding:32px 36px;margin-bottom:24px;display:flex;align-items:center;justify-content:space-between;gap:24px;flex-wrap:wrap;position:relative;overflow:hidden;border:1px solid}
.bias-hero::before{content:'';position:absolute;inset:0;opacity:.06;background:radial-gradient(ellipse at 70% 50%, currentColor 0%, transparent 70%)}
.bias-bullish-strong{background:rgba(38,166,154,.08);border-color:rgba(38,166,154,.4);color:var(--bull-s)}
.bias-bullish       {background:rgba(76,175,80,.06); border-color:rgba(76,175,80,.35); color:var(--bull)}
.bias-bullish-weak  {background:rgba(139,195,74,.05);border-color:rgba(139,195,74,.3); color:var(--bull-w)}
.bias-bearish-strong{background:rgba(239,83,80,.08); border-color:rgba(239,83,80,.4);  color:var(--bear-s)}
.bias-bearish       {background:rgba(244,67,54,.06); border-color:rgba(244,67,54,.35); color:var(--bear)}
.bias-bearish-weak  {background:rgba(255,112,67,.05);border-color:rgba(255,112,67,.3); color:var(--bear-w)}
.bias-neutral       {background:rgba(144,164,174,.05);border-color:rgba(144,164,174,.3);color:var(--neutral)}
.bias-left h2{font-size:36px;font-weight:800;line-height:1;margin-bottom:8px}
.bias-left .bias-sub{font-family:var(--mono);font-size:11px;opacity:.7;letter-spacing:1px;text-transform:uppercase}
.bias-summary{font-size:14px;color:var(--text);opacity:.85;max-width:600px;line-height:1.6}
.bias-score-ring{flex-shrink:0;position:relative;width:100px;height:100px}
.bias-score-ring svg{width:100%;height:100%;transform:rotate(-90deg)}
.bias-score-ring .score-text{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;font-family:var(--mono)}
.bias-score-ring .score-num{font-size:24px;font-weight:700;line-height:1}
.bias-score-ring .score-lbl{font-size:8px;color:var(--muted);letter-spacing:1px;text-transform:uppercase}

/* ── Faktor Tags ── */
.factors{display:flex;flex-wrap:wrap;gap:6px;margin-top:16px}
.factor-tag{font-family:var(--mono);font-size:9px;padding:3px 8px;border-radius:4px;border:1px solid;letter-spacing:.3px}
.factor-bull{color:var(--long);border-color:rgba(38,166,154,.35);background:rgba(38,166,154,.08)}
.factor-bear{color:var(--short);border-color:rgba(239,83,80,.35);background:rgba(239,83,80,.08)}

/* ── Grid Layouts ── */
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:20px}
.three-col{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;margin-bottom:20px}
.full-col{margin-bottom:20px}
@media(max-width:900px){.two-col,.three-col{grid-template-columns:1fr}}

/* ── Panel ── */
.panel{background:var(--bg2);border:1px solid var(--border);border-radius:12px;overflow:hidden}
.panel-header{display:flex;align-items:center;justify-content:space-between;padding:14px 20px;border-bottom:1px solid var(--border);background:var(--bg3)}
.panel-title{font-weight:700;font-size:13px;display:flex;align-items:center;gap:8px}
.panel-icon{width:22px;height:22px;border-radius:5px;display:grid;place-items:center;font-size:12px;flex-shrink:0}
.panel-badge{font-family:var(--mono);font-size:10px;padding:2px 8px;border-radius:4px;border:1px solid}
.panel-body{padding:20px}
.panel-body-sm{padding:14px 20px}

/* ── TF Tabs ── */
.tf-tabs{display:flex;gap:6px;margin-bottom:16px}
.tf-tab{background:var(--bg3);border:1px solid var(--border2);color:var(--muted);padding:6px 16px;border-radius:6px;font-family:var(--mono);font-size:11px;cursor:pointer;transition:all .15s}
.tf-tab.active{background:rgba(206,147,216,.1);border-color:rgba(206,147,216,.4);color:var(--fib)}

/* ── Metric Rows ── */
.metric-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:12px}
.metric{background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);padding:12px 14px;position:relative;overflow:hidden}
.metric::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--m-accent,var(--accent))}
.metric-label{font-family:var(--mono);font-size:9px;color:var(--muted);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:6px}
.metric-value{font-family:var(--mono);font-size:20px;font-weight:700;line-height:1}
.metric-sub{font-family:var(--mono);font-size:9px;color:var(--muted);margin-top:3px}

/* ── EMA Ladder ── */
.ema-ladder{display:flex;flex-direction:column;gap:6px}
.ema-row{display:flex;align-items:center;justify-content:space-between;padding:8px 12px;background:var(--bg3);border:1px solid var(--border);border-radius:6px;font-family:var(--mono);font-size:11px}
.ema-name{color:var(--muted);width:60px}
.ema-price{font-weight:700}
.ema-dist{font-size:9px;padding:2px 6px;border-radius:3px}
.ema-above{color:var(--long);background:rgba(38,166,154,.1)}
.ema-below{color:var(--short);background:rgba(239,83,80,.1)}

/* ── RSI Gauge ── */
.rsi-gauge{position:relative;height:12px;background:linear-gradient(to right,#ef5350 0%,#ff9800 30%,#4fc3f7 45%,#26a69a 55%,#ff9800 70%,#ef5350 100%);border-radius:6px;margin:12px 0;overflow:visible}
.rsi-marker{position:absolute;top:50%;transform:translate(-50%,-50%);width:18px;height:18px;background:var(--text);border:2px solid var(--bg);border-radius:50%;box-shadow:0 2px 8px rgba(0,0,0,.5);transition:left .5s ease}

/* ── MACD Visual ── */
.macd-bars{display:flex;align-items:flex-end;gap:2px;height:50px;padding:0 4px}
.macd-bar{flex:1;border-radius:2px 2px 0 0;min-height:2px;transition:height .3s}
.macd-zero{width:100%;height:1px;background:var(--border2)}

/* ── Fibonacci Table ── */
.fib-table{width:100%;border-collapse:collapse}
.fib-table th{font-family:var(--mono);font-size:9px;color:var(--muted);letter-spacing:1px;text-transform:uppercase;padding:6px 10px;text-align:left;border-bottom:1px solid var(--border)}
.fib-table td{font-family:var(--mono);font-size:11px;padding:7px 10px;border-bottom:1px solid rgba(33,38,45,.6)}
.fib-table tr:last-child td{border-bottom:none}
.fib-table tr.fib-active{background:rgba(206,147,216,.06)}
.fib-table tr.fib-active td{color:var(--fib)}
.fib-tag{display:inline-block;font-size:8px;padding:1px 5px;border-radius:3px;border:1px solid;margin-left:4px}
.fib-above{color:var(--short);border-color:rgba(239,83,80,.4);background:rgba(239,83,80,.08)}
.fib-below{color:var(--long);border-color:rgba(38,166,154,.4);background:rgba(38,166,154,.08)}
.fib-active-tag{color:var(--fib);border-color:rgba(206,147,216,.4);background:rgba(206,147,216,.08)}
.fib-bar-cell{width:80px}
.fib-bar-track{height:4px;background:var(--border2);border-radius:2px;overflow:hidden}
.fib-bar-fill{height:100%;background:var(--fib);border-radius:2px}

/* ── Key Levels ── */
.levels-chart{position:relative;padding:20px 100px 20px 10px;min-height:200px}
.level-line{position:relative;display:flex;align-items:center;margin:3px 0;cursor:default}
.level-price-line{flex:1;height:1px;margin:0 8px}
.level-price-line.support   {background:linear-gradient(to right,var(--long),transparent)}
.level-price-line.resistance{background:linear-gradient(to right,var(--short),transparent)}
.level-price-line.ema       {background:linear-gradient(to right,var(--accent),transparent)}
.level-price-line.bsl       {background:linear-gradient(to right,var(--accent2),transparent)}
.level-price-line.ssl       {background:linear-gradient(to right,var(--phase-c),transparent)}
.level-label{font-family:var(--mono);font-size:9px;white-space:nowrap}
.level-price{font-family:var(--mono);font-size:11px;font-weight:700;width:90px;text-align:right;position:absolute;right:0}
.current-price-line{position:relative;display:flex;align-items:center;margin:6px 0;z-index:2}
.current-price-line .cp-dash{flex:1;height:2px;margin:0 8px;background:var(--accent);box-shadow:0 0 8px var(--accent)}
.current-price-line .cp-label{font-family:var(--mono);font-size:11px;font-weight:700;color:var(--accent)}

/* ── Structure Badge ── */
.struct-badge{display:inline-flex;align-items:center;gap:6px;padding:6px 14px;border-radius:6px;border:1px solid;font-family:var(--mono);font-size:11px;font-weight:700}
.msb-alert{padding:8px 14px;border-radius:6px;border:1px solid;font-family:var(--mono);font-size:11px;margin-top:8px}

/* ── Liquidity ── */
.liq-list{display:flex;flex-direction:column;gap:4px}
.liq-item{display:flex;justify-content:space-between;align-items:center;padding:7px 12px;background:var(--bg3);border-radius:6px;font-family:var(--mono);font-size:11px}
.liq-tag{font-size:9px;padding:2px 6px;border-radius:3px;border:1px solid}
.liq-bsl{color:var(--short);border-color:rgba(239,83,80,.4);background:rgba(239,83,80,.08)}
.liq-ssl{color:var(--long);border-color:rgba(38,166,154,.4);background:rgba(38,166,154,.08)}

/* ── Phase Card ── */
.phase-card{border-radius:10px;padding:20px;border:1px solid;position:relative;overflow:hidden}
.phase-name{font-size:22px;font-weight:800;margin-bottom:6px}
.phase-desc{font-size:12px;color:var(--text);opacity:.8;line-height:1.5}
.phase-metrics{display:flex;gap:12px;margin-top:14px;flex-wrap:wrap}
.phase-metric{font-family:var(--mono);font-size:10px;color:var(--muted)}
.phase-metric span{font-weight:700;color:var(--text)}

/* ── Volume OBV ── */
.obv-arrow{font-size:24px;font-weight:800}
.vol-ratio-bar{height:8px;background:var(--border2);border-radius:4px;overflow:hidden;margin:8px 0}
.vol-ratio-fill{height:100%;border-radius:4px;transition:width .5s}

/* ── Swing Points ── */
.swing-row{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid rgba(33,38,45,.6)}
.swing-row:last-child{border-bottom:none}

/* ── Animations ── */
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
.anim{animation:fadeUp .4s ease both}
.anim-d1{animation-delay:.05s}.anim-d2{animation-delay:.1s}.anim-d3{animation-delay:.15s}
.anim-d4{animation-delay:.2s}.anim-d5{animation-delay:.25s}

::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}
</style>
</head>
<body>
<div class="shell">

<header>
  <div class="logo">
    <div class="logo-icon">📐</div>
    <div class="logo-text"><h1>Makro-Analyse</h1><span>BTC/USDT · 1W + 1D</span></div>
  </div>
  <div class="nav-links">
    <a href="/" class="nav-link">⚡ Signale</a>
    <a href="/macro" class="nav-link active">📐 Makro</a>
    <a href="/liquidity" class="nav-link">🔥 Liquidität</a>
  </div>
  <div style="display:flex;align-items:center;gap:10px">
    <div class="cache-info" id="cacheInfo">Lade …</div>
    <button class="refresh-btn" onclick="loadMacro(true)">↻ Neu analysieren</button>
  </div>
</header>

<div id="content">
  <div class="loading-state">
    <div class="spinner"></div>
    <div>Analysiere BTC 1W + 1D …<br><small style="color:var(--dim)">Erste Analyse kann 10–20 Sekunden dauern</small></div>
  </div>
</div>

</div>
<script>
let DATA = null;
let activeTf = 'daily';

async function loadMacro(force=false) {
  document.getElementById('content').innerHTML = `
    <div class="loading-state">
      <div class="spinner"></div>
      <div>${force ? 'Analysiere neu …' : 'Lade Analyse …'}</div>
    </div>`;

  try {
    const url = '/api/macro' + (force ? '?force=1' : '');
    const r   = await fetch(url);
    DATA      = await r.json();
    if (DATA.error) throw new Error(DATA.error);
    render();
  } catch(e) {
    document.getElementById('content').innerHTML =
      `<div class="error-state">Fehler: ${e.message}<br><small>${e.stack||''}</small></div>`;
  }
}

function fmt(n)    { return n != null ? Number(n).toLocaleString('de-DE', {maximumFractionDigits:0}) : '—' }
function fmtD(n,d=1){ return n != null ? Number(n).toFixed(d) : '—' }
function pct(n)    { return n != null ? (n > 0 ? '+' : '') + fmtD(n) + '%' : '—' }

function biasClass(s) {
  const m = {'bullish-strong':'bias-bullish-strong','bullish':'bias-bullish','bullish-weak':'bias-bullish-weak',
             'bearish-strong':'bias-bearish-strong','bearish':'bias-bearish','bearish-weak':'bias-bearish-weak',
             'neutral':'bias-neutral'};
  return m[s] || 'bias-neutral';
}

function render() {
  const d      = DATA;
  const bias   = d.bias || {};
  const tf     = activeTf === 'daily' ? d.daily : d.weekly;
  const fib    = d.fibonacci || {};
  const levels = d.key_levels || [];
  const price  = (d.daily || {}).price || 0;

  // Cache info
  document.getElementById('cacheInfo').textContent =
    d.from_cache
      ? `Cache · vor ${d.cache_age_hours}h`
      : `Frisch · ${new Date(d.generated_at).toLocaleTimeString('de-DE',{hour:'2-digit',minute:'2-digit'})}`;

  // Bias score ring
  const sc     = bias.score || 0;
  const scAbs  = Math.abs(sc);
  const circ   = 2 * Math.PI * 38;
  const dash   = (scAbs / 10) * circ;
  const ringColor = sc > 3 ? 'var(--long)' : sc < -3 ? 'var(--short)' : 'var(--accent)';
  const factorsHtml = (bias.factors||[]).map(f =>
    `<span class="factor-tag ${f.includes('✓') ? 'factor-bull' : 'factor-bear'}">${f}</span>`
  ).join('');

  // TF data
  if (!tf || tf.error) {
    document.getElementById('content').innerHTML =
      `<div class="error-state">Keine Daten für ${activeTf}: ${(tf||{}).error||'unbekannt'}</div>`;
    return;
  }

  const emas   = tf.emas   || {};
  const macd   = tf.macd   || {};
  const vol    = tf.volume || {};
  const struct = tf.structure || {};
  const liq    = tf.liquidity || {};
  const phase  = tf.phase  || {};
  const rsiDiv = tf.rsi_divergence || {};

  // EMA distances
  function emaDist(val) {
    if (!val || !price) return '';
    const d = ((price - val) / val * 100).toFixed(1);
    return `<span class="ema-dist ${d >= 0 ? 'ema-above' : 'ema-below'}">${d >= 0 ? '+' : ''}${d}%</span>`;
  }

  // Fibonacci rows
  const fibLevels = fib.levels || {};
  const fibRows = Object.entries(fibLevels).map(([k, v]) => {
    const active = v.active;
    const proxPct = Math.min(100, 100 - v.distance_pct * 10);
    return `<tr class="${active ? 'fib-active' : ''}">
      <td>${v.name}${active ? '<span class="fib-tag fib-active-tag">AKTIV</span>' : ''}</td>
      <td style="font-weight:700">$${fmt(v.price)}</td>
      <td><span class="fib-tag ${v.above ? 'fib-above' : 'fib-below'}">${v.above ? 'R' : 'S'}</span></td>
      <td>${fmtD(v.distance_pct)}%</td>
      <td class="fib-bar-cell"><div class="fib-bar-track"><div class="fib-bar-fill" style="width:${Math.max(2,proxPct)}%"></div></div></td>
    </tr>`;
  }).join('');

  // Key Levels chart
  const allLevels = [...levels].sort((a,b) => a.price - b.price);
  const priceRange = allLevels.length > 1
    ? allLevels[allLevels.length-1].price - allLevels[0].price
    : price * 0.2;
  const minP = allLevels.length > 0 ? allLevels[0].price - priceRange * 0.1 : price * 0.9;
  const maxP = allLevels.length > 0 ? allLevels[allLevels.length-1].price + priceRange * 0.1 : price * 1.1;

  function typeClass(t) {
    if (!t) return 'ema';
    const tl = t.toLowerCase();
    if (tl === 'support') return 'support';
    if (tl === 'resistance') return 'resistance';
    if (tl === 'ema') return 'ema';
    if (tl === 'bsl') return 'bsl';
    if (tl === 'ssl') return 'ssl';
    return 'ema';
  }
  function typeColor(t) {
    if (!t) return 'var(--accent)';
    const m = {support:'var(--long)',resistance:'var(--short)',ema:'var(--accent)',bsl:'var(--accent2)',ssl:'var(--phase-c)'};
    return m[t.toLowerCase()] || 'var(--muted)';
  }

  // Build levels HTML with current price marker
  let levelsHtml = '';
  let priceInserted = false;
  for (const lv of [...allLevels].reverse()) {
    if (!priceInserted && lv.price <= price) {
      levelsHtml += `<div class="current-price-line">
        <div class="cp-label">▶ $${fmt(price)}</div>
        <div class="cp-dash"></div>
        <div class="cp-label">AKTUELL</div>
      </div>`;
      priceInserted = true;
    }
    const tc = typeClass(lv.type);
    const col = typeColor(lv.type);
    levelsHtml += `<div class="level-line">
      <div class="level-label" style="color:${col};width:70px;font-family:var(--mono);font-size:9px">${lv.source}</div>
      <div class="level-price-line ${tc}"></div>
      <div class="level-price" style="color:${col}">$${fmt(lv.price)}</div>
    </div>`;
  }
  if (!priceInserted) {
    levelsHtml += `<div class="current-price-line">
      <div class="cp-label">▶ $${fmt(price)}</div>
      <div class="cp-dash"></div>
      <div class="cp-label">AKTUELL</div>
    </div>` + levelsHtml;
  }

  // Swing points
  const swingHighs = struct.swing_highs || [];
  const swingLows  = struct.swing_lows  || [];

  // BSL/SSL
  const bslHtml = (liq.bsl||[]).map(p =>
    `<div class="liq-item"><span>$${fmt(p)}</span><span class="liq-tag liq-bsl">BSL</span></div>`
  ).join('') || '<div style="color:var(--muted);font-family:var(--mono);font-size:11px">Keine BSL erkannt</div>';
  const sslHtml = (liq.ssl||[]).map(p =>
    `<div class="liq-item"><span>$${fmt(p)}</span><span class="liq-tag liq-ssl">SSL</span></div>`
  ).join('') || '<div style="color:var(--muted);font-family:var(--mono);font-size:11px">Keine SSL erkannt</div>';

  // RSI color
  const rsiColor = tf.rsi > 70 ? 'var(--short)' : tf.rsi < 30 ? 'var(--long)' : 'var(--accent2)';

  document.getElementById('content').innerHTML = `

  <!-- BIAS HERO -->
  <div class="bias-hero ${biasClass(bias.strength)} anim">
    <div class="bias-left">
      <div style="font-family:var(--mono);font-size:10px;opacity:.6;letter-spacing:2px;text-transform:uppercase;margin-bottom:8px">Gesamt-Bias</div>
      <h2>${bias.direction || '—'}</h2>
      <div class="bias-sub">Score ${bias.score > 0 ? '+' : ''}${bias.score || 0} / ±${bias.max_score || 10}</div>
      <div class="bias-summary" style="margin-top:12px">${bias.summary || ''}</div>
      <div class="factors">${factorsHtml}</div>
    </div>
    <div class="bias-score-ring">
      <svg viewBox="0 0 100 100">
        <circle cx="50" cy="50" r="38" fill="none" stroke="rgba(255,255,255,.06)" stroke-width="8"/>
        <circle cx="50" cy="50" r="38" fill="none" stroke="${ringColor}" stroke-width="8"
                stroke-dasharray="${dash} ${circ}" stroke-linecap="round" opacity=".9"/>
      </svg>
      <div class="score-text">
        <div class="score-num" style="color:${ringColor}">${scAbs}</div>
        <div class="score-lbl">/ 10</div>
      </div>
    </div>
  </div>

  <!-- TF Tabs -->
  <div class="tf-tabs anim anim-d1">
    <button class="tf-tab ${activeTf==='daily'?'active':''}"  onclick="setTf('daily')">📅 1D — Daily</button>
    <button class="tf-tab ${activeTf==='weekly'?'active':''}" onclick="setTf('weekly')">📆 1W — Weekly</button>
  </div>

  <!-- ROW 1: Metrics + Phase + EMA -->
  <div class="two-col anim anim-d2">

    <!-- Metriken -->
    <div class="panel">
      <div class="panel-header">
        <div class="panel-title"><div class="panel-icon" style="background:rgba(240,192,64,.15)">📊</div> Marktmetriken</div>
        <div class="panel-badge" style="color:var(--fib);border-color:rgba(206,147,216,.3);background:rgba(206,147,216,.08)">${tf.label}</div>
      </div>
      <div class="panel-body">
        <div class="metric-grid">
          <div class="metric" style="--m-accent:var(--accent)">
            <div class="metric-label">Preis</div>
            <div class="metric-value" style="color:var(--accent);font-size:16px">$${fmt(tf.price)}</div>
          </div>
          <div class="metric" style="--m-accent:${rsiColor}">
            <div class="metric-label">RSI(14)</div>
            <div class="metric-value" style="color:${rsiColor}">${fmtD(tf.rsi)}</div>
            <div class="metric-sub">${tf.rsi_zone}</div>
          </div>
          <div class="metric" style="--m-accent:var(--accent2)">
            <div class="metric-label">ATR</div>
            <div class="metric-value" style="font-size:16px">$${fmt(tf.atr)}</div>
            <div class="metric-sub">${fmtD(tf.atr_pct)}% · ${tf.atr_state}</div>
          </div>
          <div class="metric" style="--m-accent:${vol.obv_bias==='Bullisch'?'var(--long)':'var(--short)'}">
            <div class="metric-label">Volumen</div>
            <div class="metric-value" style="font-size:16px">×${fmtD(vol.ratio)}</div>
            <div class="metric-sub">${vol.vs_avg} · OBV ${vol.obv_bias}</div>
          </div>
        </div>

        <!-- RSI Gauge -->
        <div style="margin-top:16px">
          <div style="font-family:var(--mono);font-size:9px;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin-bottom:4px">RSI POSITION</div>
          <div style="display:flex;justify-content:space-between;font-family:var(--mono);font-size:9px;color:var(--muted)">
            <span>0</span><span>30 OS</span><span>50</span><span>70 OB</span><span>100</span>
          </div>
          <div class="rsi-gauge">
            <div class="rsi-marker" style="left:${tf.rsi}%"></div>
          </div>
        </div>

        <!-- RSI Divergenz -->
        ${rsiDiv.type !== 'Keine' ? `
        <div style="margin-top:12px;padding:8px 12px;border-radius:6px;border:1px solid;
          ${rsiDiv.type==='Bullisch'?'background:rgba(38,166,154,.08);border-color:rgba(38,166,154,.3);color:var(--long)':'background:rgba(239,83,80,.08);border-color:rgba(239,83,80,.3);color:var(--short)'}">
          <div style="font-family:var(--mono);font-size:10px;font-weight:700">${rsiDiv.type==='Bullisch'?'▲':'▼'} RSI DIVERGENZ — ${rsiDiv.type}</div>
          <div style="font-size:11px;opacity:.8;margin-top:2px">${rsiDiv.detail}</div>
        </div>` : ''}
      </div>
    </div>

    <!-- Phase -->
    <div class="panel">
      <div class="panel-header">
        <div class="panel-title"><div class="panel-icon" style="background:rgba(255,152,0,.15)">🔄</div> Marktphase & Struktur</div>
      </div>
      <div class="panel-body">
        <div class="phase-card" style="background:${phase.color}12;border-color:${phase.color}40;color:${phase.color}">
          <div class="phase-name">${phase.phase || '—'}</div>
          <div class="phase-desc" style="color:var(--text)">${phase.description || ''}</div>
          <div class="phase-metrics">
            <div class="phase-metric">Preis/EMA50 <span>${pct(phase.price_vs_50)}</span></div>
            <div class="phase-metric">Preis/EMA200 <span>${pct(phase.price_vs_200)}</span></div>
            <div class="phase-metric">EMA Spread <span>${pct(phase.ema_spread)}</span></div>
            <div class="phase-metric">Volatilität (20) <span>${fmtD(phase.volatility_20)}%</span></div>
          </div>
        </div>

        <div style="margin-top:16px">
          <div style="font-family:var(--mono);font-size:9px;color:var(--muted);letter-spacing:1px;margin-bottom:8px">MARKTSTRUKTUR</div>
          <div class="struct-badge" style="
            ${struct.type&&struct.type.includes('Bullisch')?'color:var(--long);border-color:rgba(38,166,154,.4);background:rgba(38,166,154,.08)':
              struct.type&&struct.type.includes('Bärisch')?'color:var(--short);border-color:rgba(239,83,80,.4);background:rgba(239,83,80,.08)':
              'color:var(--muted);border-color:var(--border);background:var(--bg3)'}">
            ${struct.type || '—'}
          </div>
          ${struct.msb ? `<div class="msb-alert" style="${struct.msb.includes('Bullish')?'color:var(--long);border-color:rgba(38,166,154,.3);background:rgba(38,166,154,.06)':'color:var(--short);border-color:rgba(239,83,80,.3);background:rgba(239,83,80,.06)'}">⚡ ${struct.msb}</div>` : ''}

          <div style="margin-top:12px;display:grid;grid-template-columns:1fr 1fr;gap:8px">
            <div>
              <div style="font-family:var(--mono);font-size:9px;color:var(--muted);margin-bottom:4px">SWING HIGHS</div>
              ${swingHighs.map(v=>`<div class="swing-row"><span style="font-family:var(--mono);font-size:11px;color:var(--short)">$${fmt(v)}</span></div>`).join('')}
            </div>
            <div>
              <div style="font-family:var(--mono);font-size:9px;color:var(--muted);margin-bottom:4px">SWING LOWS</div>
              ${swingLows.map(v=>`<div class="swing-row"><span style="font-family:var(--mono);font-size:11px;color:var(--long)">$${fmt(v)}</span></div>`).join('')}
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- ROW 2: EMA Ladder + MACD + Volume -->
  <div class="three-col anim anim-d3">

    <!-- EMA Ladder -->
    <div class="panel">
      <div class="panel-header">
        <div class="panel-title"><div class="panel-icon" style="background:rgba(240,192,64,.15)">〰</div> EMA Ladder</div>
        <span class="panel-badge" style="
          ${tf.ema_trend==='Bullisch'?'color:var(--long);border-color:rgba(38,166,154,.3);background:rgba(38,166,154,.08)':
            tf.ema_trend==='Bärisch'?'color:var(--short);border-color:rgba(239,83,80,.3);background:rgba(239,83,80,.08)':
            'color:var(--muted);border-color:var(--border);background:var(--bg3)'}">
          ${tf.ema_trend}
        </span>
      </div>
      <div class="panel-body">
        <div class="ema-ladder">
          <!-- Current Price -->
          <div class="ema-row" style="border-color:rgba(240,192,64,.4);background:rgba(240,192,64,.06)">
            <div class="ema-name" style="color:var(--accent)">Preis</div>
            <div class="ema-price" style="color:var(--accent)">$${fmt(tf.price)}</div>
            <div></div>
          </div>
          ${Object.entries(emas).sort((a,b)=>a[1]-b[1]).reverse().map(([name,val])=>`
          <div class="ema-row">
            <div class="ema-name">${name.toUpperCase()}</div>
            <div class="ema-price">$${fmt(val)}</div>
            ${emaDist(val)}
          </div>`).join('')}
        </div>
      </div>
    </div>

    <!-- MACD -->
    <div class="panel">
      <div class="panel-header">
        <div class="panel-title"><div class="panel-icon" style="background:rgba(79,195,247,.15)">📈</div> MACD</div>
        <span class="panel-badge" style="color:var(--accent2);border-color:rgba(79,195,247,.3);background:rgba(79,195,247,.08)">${macd.cross || '—'}</span>
      </div>
      <div class="panel-body">
        <div class="metric-grid" style="grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:16px">
          <div class="metric" style="--m-accent:var(--accent2);padding:10px">
            <div class="metric-label">Linie</div>
            <div class="metric-value" style="color:${macd.line>0?'var(--long)':'var(--short)'};font-size:14px">${fmtD(macd.line)}</div>
          </div>
          <div class="metric" style="--m-accent:var(--phase-c);padding:10px">
            <div class="metric-label">Signal</div>
            <div class="metric-value" style="font-size:14px">${fmtD(macd.signal)}</div>
          </div>
          <div class="metric" style="--m-accent:${macd.hist>0?'var(--long)':'var(--short)'};padding:10px">
            <div class="metric-label">Histogramm</div>
            <div class="metric-value" style="color:${macd.hist>0?'var(--long)':'var(--short)'};font-size:14px">${fmtD(macd.hist)}</div>
          </div>
        </div>
        <div style="background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);padding:12px">
          <div style="font-family:var(--mono);font-size:10px;color:var(--muted);margin-bottom:8px">MOMENTUM</div>
          <div style="font-family:var(--mono);font-size:12px;color:${macd.above_zero?'var(--long)':'var(--short)'};font-weight:700">
            ${macd.above_zero ? '▲ Über Null-Linie' : '▼ Unter Null-Linie'}
          </div>
          <div style="font-family:var(--mono);font-size:11px;color:var(--muted);margin-top:4px">
            Histogramm: ${macd.momentum}
          </div>
        </div>
      </div>
    </div>

    <!-- Volumen + OBV -->
    <div class="panel">
      <div class="panel-header">
        <div class="panel-title"><div class="panel-icon" style="background:rgba(206,147,216,.15)">📊</div> Volumen & OBV</div>
        <span class="panel-badge" style="${vol.obv_bias==='Bullisch'?'color:var(--long);border-color:rgba(38,166,154,.3);background:rgba(38,166,154,.08)':'color:var(--short);border-color:rgba(239,83,80,.3);background:rgba(239,83,80,.08)'}">
          OBV ${vol.obv_bias}
        </span>
      </div>
      <div class="panel-body">
        <div style="text-align:center;padding:12px 0">
          <div class="obv-arrow" style="color:${vol.obv_bias==='Bullisch'?'var(--long)':'var(--short)'}">
            ${vol.obv_bias==='Bullisch' ? '▲' : '▼'}
          </div>
          <div style="font-family:var(--mono);font-size:11px;color:var(--muted);margin-top:4px">On-Balance Volume</div>
        </div>
        <div style="margin-top:8px">
          <div style="display:flex;justify-content:space-between;font-family:var(--mono);font-size:10px;color:var(--muted);margin-bottom:4px">
            <span>Volumen vs. 20MA</span>
            <span style="color:${vol.ratio>1.2?'var(--long)':vol.ratio<0.8?'var(--short)':'var(--muted)'}">×${fmtD(vol.ratio)}</span>
          </div>
          <div class="vol-ratio-bar">
            <div class="vol-ratio-fill" style="width:${Math.min(100,vol.ratio*50)}%;background:${vol.ratio>1.2?'var(--long)':vol.ratio<0.8?'var(--short)':'var(--muted)'}"></div>
          </div>
          <div style="font-family:var(--mono);font-size:11px;color:${vol.ratio>1.5?'var(--long)':vol.ratio<0.7?'var(--short)':'var(--muted)'}">
            ${vol.vs_avg} Volumen
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- ROW 3: Fibonacci + Key Levels -->
  <div class="two-col anim anim-d4">

    <!-- Fibonacci -->
    <div class="panel">
      <div class="panel-header">
        <div class="panel-title"><div class="panel-icon" style="background:rgba(206,147,216,.15)">📐</div> Fibonacci Retracement</div>
        <span class="panel-badge" style="color:var(--fib);border-color:rgba(206,147,216,.3);background:rgba(206,147,216,.08)">
          ${fib.direction || '—'} · ${fmt(fib.swing_low)} → ${fmt(fib.swing_high)}
        </span>
      </div>
      <div class="panel-body-sm">
        <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:14px">
          <div class="metric" style="--m-accent:var(--long);padding:10px">
            <div class="metric-label">Swing Low</div>
            <div class="metric-value" style="color:var(--long);font-size:14px">$${fmt(fib.swing_low)}</div>
          </div>
          <div class="metric" style="--m-accent:var(--fib);padding:10px">
            <div class="metric-label">Range</div>
            <div class="metric-value" style="font-size:14px">$${fmt(fib.range)}</div>
          </div>
          <div class="metric" style="--m-accent:var(--short);padding:10px">
            <div class="metric-label">Swing High</div>
            <div class="metric-value" style="color:var(--short);font-size:14px">$${fmt(fib.swing_high)}</div>
          </div>
        </div>
        ${fib.next_support ? `
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px">
          <div style="padding:8px 12px;background:rgba(38,166,154,.06);border:1px solid rgba(38,166,154,.3);border-radius:6px;font-family:var(--mono);font-size:11px">
            <div style="color:var(--muted);font-size:9px;margin-bottom:2px">NÄ. FIB SUPPORT</div>
            <div style="color:var(--long);font-weight:700">$${fmt(fib.next_support.price)}</div>
            <div style="color:var(--muted);font-size:9px">${fib.next_support.name} · ${fmtD(fib.next_support.distance_pct)}% entfernt</div>
          </div>
          ${fib.next_resistance ? `
          <div style="padding:8px 12px;background:rgba(239,83,80,.06);border:1px solid rgba(239,83,80,.3);border-radius:6px;font-family:var(--mono);font-size:11px">
            <div style="color:var(--muted);font-size:9px;margin-bottom:2px">NÄ. FIB RESISTANCE</div>
            <div style="color:var(--short);font-weight:700">$${fmt(fib.next_resistance.price)}</div>
            <div style="color:var(--muted);font-size:9px">${fib.next_resistance.name} · ${fmtD(fib.next_resistance.distance_pct)}% entfernt</div>
          </div>` : ''}
        </div>` : ''}
        <table class="fib-table">
          <thead><tr>
            <th>Level</th><th>Preis</th><th>Typ</th><th>Abstand</th><th>Nähe</th>
          </tr></thead>
          <tbody>${fibRows}</tbody>
        </table>
      </div>
    </div>

    <!-- Key Levels + Liquidität -->
    <div style="display:flex;flex-direction:column;gap:16px">

      <!-- Key Levels -->
      <div class="panel">
        <div class="panel-header">
          <div class="panel-title"><div class="panel-icon" style="background:rgba(240,192,64,.15)">🎯</div> Key Levels</div>
        </div>
        <div class="panel-body-sm" style="max-height:320px;overflow-y:auto">
          <div class="levels-chart">${levelsHtml}</div>
        </div>
      </div>

      <!-- Liquidität -->
      <div class="panel">
        <div class="panel-header">
          <div class="panel-title"><div class="panel-icon" style="background:rgba(79,195,247,.15)">💧</div> Liquiditätszonen</div>
        </div>
        <div class="panel-body-sm">
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
            <div>
              <div style="font-family:var(--mono);font-size:9px;color:var(--short);letter-spacing:1px;margin-bottom:8px">BUY SIDE LIQUIDITY (BSL)</div>
              <div class="liq-list">${bslHtml}</div>
            </div>
            <div>
              <div style="font-family:var(--mono);font-size:9px;color:var(--long);letter-spacing:1px;margin-bottom:8px">SELL SIDE LIQUIDITY (SSL)</div>
              <div class="liq-list">${sslHtml}</div>
            </div>
          </div>
        </div>
      </div>

    </div>
  </div>`;
}

function setTf(tf) {
  activeTf = tf;
  if (DATA) render();
}

loadMacro();
</script>
</body>
</html>
