<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BTC Liquiditätskarte</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#070b0f;--bg2:#0d1117;--bg3:#161b22;--bg4:#1c2128;
  --border:#21262d;--border2:#30363d;
  --text:#e6edf3;--muted:#7d8590;--dim:#454c56;
  --long:#26a69a;--short:#ef5350;--accent:#f0c040;--accent2:#4fc3f7;
  --liq:#ce93d8;--funding:#ff9800;
  --mono:'Space Mono',monospace;--sans:'Syne',sans-serif;
  --r:8px;
}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:var(--sans);font-size:14px;min-height:100vh;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.04) 2px,rgba(0,0,0,.04) 4px);pointer-events:none;z-index:9999}

.shell{max-width:1600px;margin:0 auto;padding:0 24px 80px}

/* ── Header ── */
header{display:flex;align-items:center;justify-content:space-between;padding:28px 0 24px;border-bottom:1px solid var(--border);margin-bottom:28px;position:sticky;top:0;background:var(--bg);z-index:100;gap:16px;flex-wrap:wrap}
.logo{display:flex;align-items:center;gap:14px}
.logo-icon{width:38px;height:38px;background:rgba(239,83,80,.2);border:1px solid rgba(239,83,80,.4);border-radius:6px;display:grid;place-items:center;font-size:18px}
.logo-text h1{font-weight:800;font-size:18px;letter-spacing:-.3px}
.logo-text span{font-family:var(--mono);font-size:10px;color:var(--muted);letter-spacing:2px;text-transform:uppercase}
.nav-links{display:flex;gap:8px}
.nav-link{background:var(--bg3);border:1px solid var(--border2);color:var(--muted);padding:7px 16px;border-radius:var(--r);font-family:var(--mono);font-size:11px;cursor:pointer;text-decoration:none;transition:all .2s}
.nav-link:hover{border-color:var(--accent);color:var(--accent)}
.nav-link.active{border-color:var(--short);color:var(--short)}
.header-right{display:flex;align-items:center;gap:10px}
.cache-badge{font-family:var(--mono);font-size:10px;color:var(--muted);background:var(--bg3);border:1px solid var(--border);padding:4px 10px;border-radius:4px}
.refresh-btn{background:var(--bg3);border:1px solid var(--border2);color:var(--text);padding:7px 16px;border-radius:var(--r);font-family:var(--mono);font-size:11px;cursor:pointer;transition:all .2s}
.refresh-btn:hover{border-color:var(--short);color:var(--short)}

/* ── Loading ── */
.loading-state{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;padding:100px;color:var(--muted);font-family:var(--mono);font-size:12px}
.spinner{width:40px;height:40px;border:2px solid var(--border2);border-top-color:var(--short);border-radius:50%;animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.error-state{padding:40px;text-align:center;color:var(--short);font-family:var(--mono)}

/* ── Bias Hero ── */
.bias-hero{border-radius:12px;padding:28px 32px;margin-bottom:24px;border:1px solid;display:flex;align-items:center;justify-content:space-between;gap:24px;flex-wrap:wrap;position:relative;overflow:hidden}
.bias-hero::before{content:'';position:absolute;inset:0;opacity:.05;background:radial-gradient(ellipse at 70% 50%,currentColor,transparent 70%)}
.bias-up  {background:rgba(38,166,154,.07);border-color:rgba(38,166,154,.4);color:var(--long)}
.bias-down{background:rgba(239,83,80,.07);border-color:rgba(239,83,80,.4);color:var(--short)}
.bias-flat{background:rgba(144,164,174,.05);border-color:rgba(144,164,174,.3);color:#90a4ae}
.bias-left h2{font-size:32px;font-weight:800;line-height:1;margin-bottom:6px}
.bias-sub{font-family:var(--mono);font-size:10px;opacity:.6;letter-spacing:2px;text-transform:uppercase;margin-bottom:12px}
.bias-summary{font-family:var(--mono);font-size:11px;color:var(--text);opacity:.8;line-height:1.7}
.mm-target{margin-top:10px;font-family:var(--mono);font-size:12px;font-weight:700;padding:6px 12px;border-radius:6px;display:inline-block;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.1)}
.score-pills{display:flex;gap:8px;flex-wrap:wrap;margin-top:14px}
.score-pill{font-family:var(--mono);font-size:10px;padding:3px 10px;border-radius:4px;border:1px solid var(--border2);color:var(--muted)}

/* ── Layout ── */
.main-grid{display:grid;grid-template-columns:1fr 340px;gap:20px;margin-bottom:20px}
.bottom-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:20px;margin-bottom:20px}
@media(max-width:1100px){.main-grid{grid-template-columns:1fr}.bottom-grid{grid-template-columns:1fr 1fr}}
@media(max-width:700px){.bottom-grid{grid-template-columns:1fr}}

/* ── Panel ── */
.panel{background:var(--bg2);border:1px solid var(--border);border-radius:12px;overflow:hidden}
.panel-header{display:flex;align-items:center;justify-content:space-between;padding:13px 18px;border-bottom:1px solid var(--border);background:var(--bg3)}
.panel-title{font-weight:700;font-size:12px;display:flex;align-items:center;gap:8px;letter-spacing:.3px}
.panel-icon{width:22px;height:22px;border-radius:4px;display:grid;place-items:center;font-size:11px;flex-shrink:0}
.panel-badge{font-family:var(--mono);font-size:10px;padding:2px 8px;border-radius:4px;border:1px solid}
.panel-body{padding:16px 18px}

/* ── Heatmap Canvas ── */
.heatmap-wrap{position:relative;background:var(--bg3);border-radius:var(--r);overflow:hidden}
#heatmapCanvas{display:block;width:100%;cursor:crosshair}
.heatmap-tooltip{position:absolute;pointer-events:none;background:rgba(13,17,23,.95);border:1px solid var(--border2);border-radius:6px;padding:8px 12px;font-family:var(--mono);font-size:10px;line-height:1.8;min-width:160px;transition:opacity .1s;opacity:0;z-index:10}

/* ── Legend ── */
.legend{display:flex;gap:16px;flex-wrap:wrap;margin-top:10px}
.legend-item{display:flex;align-items:center;gap:6px;font-family:var(--mono);font-size:10px;color:var(--muted)}
.legend-dot{width:10px;height:10px;border-radius:2px;flex-shrink:0}

/* ── Order Book Bars ── */
.ob-list{display:flex;flex-direction:column;gap:3px;max-height:480px;overflow-y:auto}
.ob-row{display:grid;grid-template-columns:90px 1fr 80px;align-items:center;gap:8px;padding:3px 0;position:relative}
.ob-price{font-family:var(--mono);font-size:11px;font-weight:700;text-align:right}
.ob-bar-wrap{position:relative;height:14px;background:var(--bg3);border-radius:2px;overflow:hidden}
.ob-bar{height:100%;border-radius:2px;transition:width .3s}
.ob-vol{font-family:var(--mono);font-size:10px;color:var(--muted);text-align:right}
.ob-current{position:relative;padding:4px 0;margin:4px 0}
.ob-current-line{height:2px;background:var(--accent);box-shadow:0 0 8px var(--accent)}
.ob-current-label{position:absolute;right:0;top:-8px;font-family:var(--mono);font-size:10px;color:var(--accent);font-weight:700}

/* ── Liquidation Levels ── */
.liq-list{display:flex;flex-direction:column;gap:4px;max-height:420px;overflow-y:auto}
.liq-row{display:flex;align-items:center;justify-content:space-between;padding:6px 10px;border-radius:5px;border:1px solid}
.liq-long{background:rgba(239,83,80,.06);border-color:rgba(239,83,80,.2)}
.liq-short{background:rgba(38,166,154,.06);border-color:rgba(38,166,154,.2)}
.liq-price{font-family:var(--mono);font-size:12px;font-weight:700}
.liq-tags{display:flex;gap:5px;align-items:center}
.liq-tag{font-family:var(--mono);font-size:9px;padding:2px 6px;border-radius:3px;border:1px solid}
.liq-vol{font-family:var(--mono);font-size:10px;color:var(--muted)}

/* ── Delta Bars ── */
.delta-bars{display:flex;flex-direction:column;gap:2px;max-height:420px;overflow-y:auto}
.delta-row{display:grid;grid-template-columns:80px 1fr 60px;gap:6px;align-items:center}
.delta-price{font-family:var(--mono);font-size:10px;color:var(--muted);text-align:right}
.delta-bar-wrap{position:relative;height:12px;background:var(--bg3);border-radius:2px;overflow:hidden;display:flex}
.delta-bar-buy{height:100%;border-radius:2px 0 0 2px}
.delta-bar-sell{height:100%;border-radius:0 2px 2px 0}
.delta-val{font-family:var(--mono);font-size:9px;color:var(--muted);text-align:right}

/* ── Metrics ── */
.metric-row{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:10px;margin-bottom:16px}
.metric{background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);padding:12px 14px;position:relative;overflow:hidden}
.metric::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--m-accent,var(--accent))}
.metric-label{font-family:var(--mono);font-size:9px;color:var(--muted);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:5px}
.metric-value{font-family:var(--mono);font-size:18px;font-weight:700;line-height:1}
.metric-sub{font-family:var(--mono);font-size:9px;color:var(--muted);margin-top:3px}

/* ── Imbalance Bar ── */
.imbalance-track{height:10px;background:var(--bg3);border-radius:5px;overflow:hidden;position:relative;margin:8px 0}
.imbalance-bid{height:100%;background:var(--long);border-radius:5px 0 0 5px;transition:width .5s}
.imbalance-ask{position:absolute;top:0;right:0;height:100%;background:var(--short);border-radius:0 5px 5px 0;transition:width .5s}

/* ── Animations ── */
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
.anim{animation:fadeUp .35s ease both}
.d1{animation-delay:.05s}.d2{animation-delay:.1s}.d3{animation-delay:.15s}.d4{animation-delay:.2s}

::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
</style>
</head>
<body>
<div class="shell">

<header>
  <div class="logo">
    <div class="logo-icon">🔥</div>
    <div class="logo-text"><h1>Liquiditätskarte</h1><span>BTC/USDT · Order Book + Liquidationen + Delta</span></div>
  </div>
  <div class="nav-links">
    <a href="/"         class="nav-link">⚡ Signale</a>
    <a href="/macro"    class="nav-link">📐 Makro</a>
    <a href="/liquidity" class="nav-link active">🔥 Liquidität</a>
  </div>
  <div class="header-right">
    <div class="cache-badge" id="cacheBadge">Lade …</div>
    <button class="refresh-btn" onclick="load(true)">↻ Aktualisieren</button>
  </div>
</header>

<div id="content">
  <div class="loading-state">
    <div class="spinner"></div>
    <div>Lade Order Book, OI + Liquidations-Levels …</div>
  </div>
</div>

</div>

<script>
let D = null;

async function load(force=false) {
  document.getElementById('content').innerHTML = `
    <div class="loading-state"><div class="spinner"></div>
    <div>${force?'Aktualisiere …':'Lade Liquiditätsdaten …'}<br>
    <small style="color:var(--dim)">Order Book wird live abgerufen</small></div></div>`;
  try {
    const r = await fetch('/api/liquidity' + (force ? '?force=1' : ''));
    D = await r.json();
    if (D.error) throw new Error(D.error);
    render();
  } catch(e) {
    document.getElementById('content').innerHTML =
      `<div class="error-state">❌ ${e.message}</div>`;
  }
}

function fmt(n)  { return n!=null ? Number(n).toLocaleString('de-DE',{maximumFractionDigits:0}) : '—' }
function fmtD(n,d=2){ return n!=null ? Number(n).toFixed(d) : '—' }
function fmtK(n) { return n>1e9 ? (n/1e9).toFixed(2)+'B' : n>1e6 ? (n/1e6).toFixed(1)+'M' : n>1e3 ? (n/1e3).toFixed(0)+'K' : n.toFixed(0) }

function biasClass(dir) {
  if (!dir) return 'bias-flat';
  if (dir.toLowerCase().includes('up') || dir.toLowerCase().includes('bull')) return 'bias-up';
  if (dir.toLowerCase().includes('down') || dir.toLowerCase().includes('bär') || dir.toLowerCase().includes('bear')) return 'bias-down';
  return 'bias-flat';
}

function render() {
  const price   = D.price;
  const bias    = D.bias    || {};
  const ob      = D.orderbook || {};
  const liq     = D.liquidations || {};
  const delta   = D.cumulative_delta || {};
  const oi      = D.oi || {};
  const heatmap = D.heatmap || [];

  // Cache badge
  document.getElementById('cacheBadge').textContent =
    D.from_cache
      ? `Cache · vor ${D.cache_age_sec}s`
      : `Live · ${new Date(D.generated_at).toLocaleTimeString('de-DE',{hour:'2-digit',minute:'2-digit'})}`;

  // OB Imbalance
  const bidPct = ob.bid_total / (ob.bid_total + ob.ask_total + 1e-9) * 100;
  const askPct = 100 - bidPct;

  // Liquidations zusammenführen und sortieren
  const allLiqs = [
    ...(liq.long_liquidations  || []).map(x=>({...x, side:'long'})),
    ...(liq.short_liquidations || []).map(x=>({...x, side:'short'})),
  ].sort((a,b) => b.price - a.price);

  // Order Book: Asks (oben, rot) + Bids (unten, grün) — nach Preis sortiert
  const asks = [...(ob.asks||[])].sort((a,b) => b.price - a.price);
  const bids = [...(ob.bids||[])].sort((a,b) => b.price - a.price);
  const maxObStr = Math.max(
    ...(ob.asks||[]).map(x=>x.strength||0),
    ...(ob.bids||[]).map(x=>x.strength||0), 1
  );

  function obRowHtml(item, side) {
    const col   = side==='ask' ? 'var(--short)' : 'var(--long)';
    const alpha = (item.strength||0) / 100;
    const bg    = side==='ask'
      ? `rgba(239,83,80,${0.05 + alpha*0.35})`
      : `rgba(38,166,154,${0.05 + alpha*0.35})`;
    return `<div class="ob-row" style="background:${bg};border-radius:3px;padding:3px 6px">
      <div class="ob-price" style="color:${col}">$${fmt(item.price)}</div>
      <div class="ob-bar-wrap">
        <div class="ob-bar" style="width:${item.strength||0}%;background:${col};opacity:.7"></div>
      </div>
      <div class="ob-vol">${item.volume>0?item.volume.toFixed(2)+' BTC':''}</div>
    </div>`;
  }

  // Delta levels (midpoints nur wo > 5% Stärke)
  const deltaLevels = (delta.levels||[])
    .filter(x => x.strength > 5)
    .sort((a,b) => b.price - a.price);

  document.getElementById('content').innerHTML = `

  <!-- BIAS HERO -->
  <div class="bias-hero ${biasClass(bias.direction)} anim">
    <div class="bias-left">
      <div style="font-family:var(--mono);font-size:9px;opacity:.5;letter-spacing:2px;text-transform:uppercase;margin-bottom:6px">Liquiditäts-Bias</div>
      <h2>${bias.direction || '—'}</h2>
      <div class="bias-sub">Score ${bias.score>0?'+':''}${fmtD(bias.score,1)}</div>
      <div class="bias-summary">${bias.summary || ''}</div>
      <div class="mm-target">${bias.mm_target || ''}</div>
      <div class="score-pills">
        <span class="score-pill">OB: ${fmtD(bias.ob_score,1)}</span>
        <span class="score-pill">Liq: ${fmtD(bias.liq_score,1)}</span>
        <span class="score-pill">Funding: ${fmtD(bias.funding_score,1)}</span>
      </div>
    </div>
    <div style="flex-shrink:0;text-align:center">
      <div style="font-family:var(--mono);font-size:42px;font-weight:800;line-height:1">$${fmt(price)}</div>
      <div style="font-family:var(--mono);font-size:10px;color:var(--muted);margin-top:4px">AKTUELLER PREIS</div>
      ${oi.funding_rate!=null ? `
      <div style="margin-top:10px;padding:6px 14px;border-radius:6px;border:1px solid var(--border2);background:var(--bg3)">
        <div style="font-family:var(--mono);font-size:9px;color:var(--muted)">FUNDING RATE</div>
        <div style="font-family:var(--mono);font-size:16px;font-weight:700;color:${oi.funding_rate>0?'var(--short)':'var(--long)'}">${oi.funding_rate>0?'+':''}${fmtD(oi.funding_rate,4)}%</div>
        <div style="font-family:var(--mono);font-size:9px;color:var(--muted)">${oi.funding_bias}</div>
      </div>` : ''}
    </div>
  </div>

  <!-- METRIKEN -->
  <div class="metric-row anim d1">
    <div class="metric" style="--m-accent:var(--long)">
      <div class="metric-label">Bid Volumen</div>
      <div class="metric-value" style="color:var(--long);font-size:16px">${fmtD(ob.bid_total,1)} BTC</div>
      <div class="metric-sub">Kauf-Liquidität</div>
    </div>
    <div class="metric" style="--m-accent:var(--short)">
      <div class="metric-label">Ask Volumen</div>
      <div class="metric-value" style="color:var(--short);font-size:16px">${fmtD(ob.ask_total,1)} BTC</div>
      <div class="metric-sub">Verkaufs-Liquidität</div>
    </div>
    <div class="metric" style="--m-accent:${ob.imbalance>0?'var(--long)':'var(--short)'}">
      <div class="metric-label">OB Imbalance</div>
      <div class="metric-value" style="color:${ob.imbalance>0?'var(--long)':'var(--short)'};font-size:16px">${ob.imbalance>0?'+':''}${fmtD(ob.imbalance,1)}%</div>
      <div class="metric-sub">${ob.imbalance>5?'Käufer dominieren':ob.imbalance<-5?'Verkäufer dominieren':'Ausgeglichen'}</div>
    </div>
    <div class="metric" style="--m-accent:var(--accent2)">
      <div class="metric-label">Cum. Delta</div>
      <div class="metric-value" style="color:${delta.delta>0?'var(--long)':'var(--short)'};font-size:16px">${delta.delta>0?'+':''}${fmtD(delta.delta,1)}</div>
      <div class="metric-sub">${delta.bias}</div>
    </div>
    ${oi.open_interest_usd ? `
    <div class="metric" style="--m-accent:var(--liq)">
      <div class="metric-label">Open Interest</div>
      <div class="metric-value" style="color:var(--liq);font-size:16px">$${fmtK(oi.open_interest_usd)}</div>
      <div class="metric-sub">Futures OI</div>
    </div>` : ''}
    <div class="metric" style="--m-accent:var(--long)">
      <div class="metric-label">Buy/Sell Ratio</div>
      <div class="metric-value" style="font-size:16px">${fmtD(delta.buy_pct,1)}%</div>
      <div class="metric-sub">Buy-initiiert · ${fmtD(100-delta.buy_pct,1)}% Sell</div>
    </div>
  </div>

  <!-- IMBALANCE BAR -->
  <div class="panel anim d1" style="margin-bottom:20px">
    <div class="panel-header">
      <div class="panel-title"><div class="panel-icon" style="background:rgba(38,166,154,.15)">⚖</div> Order Book Imbalance</div>
    </div>
    <div class="panel-body">
      <div style="display:flex;justify-content:space-between;font-family:var(--mono);font-size:10px;margin-bottom:6px">
        <span style="color:var(--long)">BIDS ${fmtD(bidPct,1)}%</span>
        <span style="color:var(--short)">ASKS ${fmtD(askPct,1)}%</span>
      </div>
      <div class="imbalance-track">
        <div class="imbalance-bid" style="width:${bidPct}%"></div>
        <div class="imbalance-ask" style="width:${askPct}%"></div>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:12px">
        ${ob.bid_wall ? `<div style="padding:8px 12px;background:rgba(38,166,154,.06);border:1px solid rgba(38,166,154,.3);border-radius:6px;font-family:var(--mono);font-size:11px">
          <div style="color:var(--muted);font-size:9px;margin-bottom:2px">GRÖSSTE BID-WAND</div>
          <div style="color:var(--long);font-weight:700">$${fmt(ob.bid_wall.price)}</div>
          <div style="color:var(--muted);font-size:9px">${ob.bid_wall.volume.toFixed(2)} BTC · ${ob.bid_wall.dist_pct}% vom Preis</div>
        </div>` : '<div></div>'}
        ${ob.ask_wall ? `<div style="padding:8px 12px;background:rgba(239,83,80,.06);border:1px solid rgba(239,83,80,.3);border-radius:6px;font-family:var(--mono);font-size:11px">
          <div style="color:var(--muted);font-size:9px;margin-bottom:2px">GRÖSSTE ASK-WAND</div>
          <div style="color:var(--short);font-weight:700">$${fmt(ob.ask_wall.price)}</div>
          <div style="color:var(--muted);font-size:9px">${ob.ask_wall.volume.toFixed(2)} BTC · ${ob.ask_wall.dist_pct}% vom Preis</div>
        </div>` : '<div></div>'}
      </div>
    </div>
  </div>

  <!-- MAIN GRID: Heatmap + Order Book -->
  <div class="main-grid anim d2">

    <!-- Heatmap -->
    <div class="panel">
      <div class="panel-header">
        <div class="panel-title"><div class="panel-icon" style="background:rgba(239,83,80,.15)">🔥</div> Liquiditäts-Heatmap</div>
        <div style="font-family:var(--mono);font-size:10px;color:var(--muted)">±15% vom Preis · ${heatmap.length} Zonen</div>
      </div>
      <div class="panel-body" style="padding:12px">
        <div class="heatmap-wrap">
          <canvas id="heatmapCanvas" height="560"></canvas>
          <div class="heatmap-tooltip" id="tooltip"></div>
        </div>
        <div class="legend">
          <div class="legend-item"><div class="legend-dot" style="background:#26a69a"></div>Bid-Liquidität</div>
          <div class="legend-item"><div class="legend-dot" style="background:#ef5350"></div>Ask-Liquidität</div>
          <div class="legend-item"><div class="legend-dot" style="background:#ef5350;opacity:.4"></div>Long-Liq. Zone</div>
          <div class="legend-item"><div class="legend-dot" style="background:#26a69a;opacity:.4"></div>Short-Liq. Zone</div>
          <div class="legend-item"><div class="legend-dot" style="background:#f0c040"></div>Aktueller Preis</div>
        </div>
      </div>
    </div>

    <!-- Order Book -->
    <div class="panel">
      <div class="panel-header">
        <div class="panel-title"><div class="panel-icon" style="background:rgba(79,195,247,.15)">📖</div> Order Book Tiefe</div>
        <span class="panel-badge" style="color:var(--accent2);border-color:rgba(79,195,247,.3);background:rgba(79,195,247,.08)">Top 30</span>
      </div>
      <div class="panel-body" style="padding:10px">
        <div class="ob-list">
          ${asks.slice(0,15).map(x=>obRowHtml(x,'ask')).join('')}
          <div class="ob-current">
            <div class="ob-current-line"></div>
            <div class="ob-current-label">$${fmt(price)}</div>
          </div>
          ${bids.slice(0,15).map(x=>obRowHtml(x,'bid')).join('')}
        </div>
      </div>
    </div>
  </div>

  <!-- BOTTOM GRID: Liquidationen + Delta -->
  <div class="bottom-grid anim d3">

    <!-- Long Liquidationen -->
    <div class="panel">
      <div class="panel-header">
        <div class="panel-title"><div class="panel-icon" style="background:rgba(239,83,80,.15)">💥</div> Long-Liquidationen</div>
        <span class="panel-badge" style="color:var(--short);border-color:rgba(239,83,80,.3);background:rgba(239,83,80,.08)">
          $${fmtK(liq.total_long_liq_usd||0)}
        </span>
      </div>
      <div class="panel-body" style="padding:10px">
        <div style="font-family:var(--mono);font-size:9px;color:var(--muted);margin-bottom:8px;padding:0 6px">
          Wenn Preis fällt → diese Level werden liquidiert → Kaskade möglich
        </div>
        <div class="liq-list">
          ${(liq.long_liquidations||[]).map(x=>`
          <div class="liq-row liq-long">
            <div class="liq-price" style="color:var(--short)">$${fmt(x.price)}</div>
            <div class="liq-tags">
              <span class="liq-tag" style="color:var(--short);border-color:rgba(239,83,80,.4)">×${x.lever}</span>
              <span class="liq-vol">${x.dist_pct}% ↓</span>
            </div>
          </div>`).join('')}
        </div>
      </div>
    </div>

    <!-- Short Liquidationen -->
    <div class="panel">
      <div class="panel-header">
        <div class="panel-title"><div class="panel-icon" style="background:rgba(38,166,154,.15)">🚀</div> Short-Liquidationen</div>
        <span class="panel-badge" style="color:var(--long);border-color:rgba(38,166,154,.3);background:rgba(38,166,154,.08)">
          $${fmtK(liq.total_short_liq_usd||0)}
        </span>
      </div>
      <div class="panel-body" style="padding:10px">
        <div style="font-family:var(--mono);font-size:9px;color:var(--muted);margin-bottom:8px;padding:0 6px">
          Wenn Preis steigt → diese Level werden liquidiert → Short-Squeeze möglich
        </div>
        <div class="liq-list">
          ${(liq.short_liquidations||[]).map(x=>`
          <div class="liq-row liq-short">
            <div class="liq-price" style="color:var(--long)">$${fmt(x.price)}</div>
            <div class="liq-tags">
              <span class="liq-tag" style="color:var(--long);border-color:rgba(38,166,154,.4)">×${x.lever}</span>
              <span class="liq-vol">${x.dist_pct}% ↑</span>
            </div>
          </div>`).join('')}
        </div>
      </div>
    </div>

    <!-- Cumulative Delta -->
    <div class="panel">
      <div class="panel-header">
        <div class="panel-title"><div class="panel-icon" style="background:rgba(240,192,64,.15)">Δ</div> Cumulative Delta</div>
        <span class="panel-badge" style="color:${delta.delta>0?'var(--long)':'var(--short)'};border-color:rgba(${delta.delta>0?'38,166,154':'239,83,80'},.3);background:rgba(${delta.delta>0?'38,166,154':'239,83,80'},.08)">
          ${delta.bias}
        </span>
      </div>
      <div class="panel-body" style="padding:10px">
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px">
          <div style="padding:8px;background:rgba(38,166,154,.06);border:1px solid rgba(38,166,154,.2);border-radius:6px;text-align:center;font-family:var(--mono)">
            <div style="font-size:9px;color:var(--muted)">BUY VOL</div>
            <div style="font-size:14px;color:var(--long);font-weight:700">${fmtD(delta.buy_pct,1)}%</div>
          </div>
          <div style="padding:8px;background:rgba(239,83,80,.06);border:1px solid rgba(239,83,80,.2);border-radius:6px;text-align:center;font-family:var(--mono)">
            <div style="font-size:9px;color:var(--muted)">SELL VOL</div>
            <div style="font-size:14px;color:var(--short);font-weight:700">${fmtD(100-delta.buy_pct,1)}%</div>
          </div>
        </div>
        <div class="delta-bars">
          ${deltaLevels.slice(0,25).map(x => {
            const buyW  = x.is_buy  ? x.strength : 0;
            const sellW = !x.is_buy ? x.strength : 0;
            return `<div class="delta-row">
              <div class="delta-price">$${fmt(x.price)}</div>
              <div class="delta-bar-wrap">
                <div class="delta-bar-buy"  style="width:${buyW}%;background:rgba(38,166,154,.6)"></div>
                <div class="delta-bar-sell" style="width:${sellW}%;background:rgba(239,83,80,.6)"></div>
              </div>
              <div class="delta-val">${x.is_buy?'+':'−'}${x.strength.toFixed(0)}%</div>
            </div>`;
          }).join('')}
        </div>
      </div>
    </div>

  </div>`;

  // Heatmap Canvas zeichnen
  requestAnimationFrame(() => drawHeatmap(heatmap, price));
}

function drawHeatmap(data, price) {
  const canvas = document.getElementById('heatmapCanvas');
  if (!canvas || !data.length) return;

  const W    = canvas.parentElement.clientWidth - 24;
  const H    = 560;
  canvas.width  = W;
  canvas.height = H;
  const ctx  = canvas.getContext('2d');
  const N    = data.length;
  const rowH = H / N;

  // Hintergrund
  ctx.fillStyle = '#0d1117';
  ctx.fillRect(0, 0, W, H);

  const priceIdx = data.findIndex(d => d.above_price === false);

  data.forEach((row, i) => {
    const y = (N - 1 - i) * rowH;  // Preis von oben nach unten invertieren

    // Hintergrund je Zone
    if (row.above_price) {
      ctx.fillStyle = 'rgba(239,83,80,0.02)';
    } else {
      ctx.fillStyle = 'rgba(38,166,154,0.02)';
    }
    ctx.fillRect(0, y, W, rowH);

    // Liquidations-Hintergrund
    if (row.liq_str > 0) {
      const alpha = row.liq_str / 100 * 0.25;
      ctx.fillStyle = row.above_price
        ? `rgba(38,166,154,${alpha})`    // Short-Liq oben = grün
        : `rgba(239,83,80,${alpha})`;    // Long-Liq unten = rot
      ctx.fillRect(0, y, W, rowH);
    }

    // Bid Bar (links, grün)
    if (row.bid_str > 0) {
      const bw = row.bid_str / 100 * (W * 0.45);
      const alpha = 0.15 + (row.bid_str / 100) * 0.75;
      ctx.fillStyle = `rgba(38,166,154,${alpha})`;
      ctx.fillRect(0, y + 1, bw, rowH - 2);
    }

    // Ask Bar (rechts, rot)
    if (row.ask_str > 0) {
      const aw = row.ask_str / 100 * (W * 0.45);
      const alpha = 0.15 + (row.ask_str / 100) * 0.75;
      ctx.fillStyle = `rgba(239,83,80,${alpha})`;
      ctx.fillRect(W - aw, y + 1, aw, rowH - 2);
    }

    // Preis-Label alle 10 Zeilen
    if (i % 5 === 0) {
      ctx.fillStyle = 'rgba(125,133,144,0.6)';
      ctx.font = '9px Space Mono, monospace';
      ctx.textAlign = 'center';
      ctx.fillText('$' + row.price.toLocaleString('de-DE'), W / 2, y + rowH - 2);
    }
  });

  // Aktuelle Preis-Linie
  const priceY = (N - 1 - (N - priceIdx - 1)) * rowH;
  ctx.strokeStyle = '#f0c040';
  ctx.lineWidth   = 2;
  ctx.shadowColor = '#f0c040';
  ctx.shadowBlur  = 8;
  ctx.beginPath();
  ctx.moveTo(0, priceY);
  ctx.lineTo(W, priceY);
  ctx.stroke();
  ctx.shadowBlur = 0;

  // Preis-Label
  ctx.fillStyle = '#f0c040';
  ctx.font = 'bold 11px Space Mono, monospace';
  ctx.textAlign = 'right';
  ctx.fillText('$' + price.toLocaleString('de-DE'), W - 6, priceY - 4);

  // Tooltip
  const tooltip = document.getElementById('tooltip');
  canvas.onmousemove = (e) => {
    const rect = canvas.getBoundingClientRect();
    const scaleY = H / rect.height;
    const my = (e.clientY - rect.top) * scaleY;
    const idx = N - 1 - Math.floor(my / rowH);
    if (idx < 0 || idx >= N) { tooltip.style.opacity = 0; return; }
    const row = data[idx];
    tooltip.style.opacity = 1;
    tooltip.style.left = (e.clientX - rect.left + 12) + 'px';
    tooltip.style.top  = (e.clientY - rect.top  - 10) + 'px';
    tooltip.innerHTML = `
      <div style="color:var(--accent);font-weight:700;margin-bottom:4px">$${row.price.toLocaleString('de-DE')}</div>
      <div style="color:var(--long)">Bid: ${row.bid.toFixed(3)} BTC (${row.bid_str}%)</div>
      <div style="color:var(--short)">Ask: ${row.ask.toFixed(3)} BTC (${row.ask_str}%)</div>
      ${row.liq_long  > 0 ? `<div style="color:#ef9a9a">Long-Liq: ${row.liq_long.toFixed(3)} BTC</div>` : ''}
      ${row.liq_short > 0 ? `<div style="color:#a5d6a7">Short-Liq: ${row.liq_short.toFixed(3)} BTC</div>` : ''}
      <div style="color:var(--muted);margin-top:2px">${row.above_price ? '▲ über Preis' : '▼ unter Preis'}</div>`;
  };
  canvas.onmouseleave = () => { tooltip.style.opacity = 0; };
}

// Auto-Refresh alle 5 Minuten
load();
setInterval(() => load(true), 300000);
</script>
</body>
